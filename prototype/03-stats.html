<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账APP - 统计页（清新可爱版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2026;
            --bg-tertiary: #242b33;
            --bg-card: #1e2630;
            --bg-hover: #2a3441;
            --text-primary: #f0f4f8;
            --text-secondary: #a8b5c4;
            --text-tertiary: #6b7c8d;
            --accent: #4ecdc4;
            --accent-gradient: linear-gradient(135deg, #4ecdc4 0%, #44a8b3 100%);
            --income: #7bed9f;
            --expense: #ff6b81;
            --border: #2a3441;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #0a0d10;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .phone-frame {
            max-width: 375px;
            margin: 40px auto;
            background: var(--bg-primary);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
            border: 2px solid #3a4756;
            min-height: 812px;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 8px;
            background: var(--bg-primary);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .time-tabs {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 4px;
        }

        .time-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .time-tab.active {
            background: var(--bg-card);
            color: var(--accent);
            font-weight: 500;
            box-shadow: 0 2px 6px var(--shadow);
        }

        .stats-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .summary-card {
            background: var(--accent-gradient);
            border-radius: 20px;
            padding: 24px;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .summary-total {
            text-align: center;
            margin-bottom: 20px;
        }

        .summary-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .summary-amount {
            font-size: 32px;
            font-weight: 700;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .item-label {
            font-size: 12px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .item-value {
            font-size: 18px;
            font-weight: 600;
        }

        .chart-card {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        /* 简单的柱状图 */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 180px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar {
            width: 28px;
            background: var(--accent-gradient);
            border-radius: 6px 6px 0 0;
            transition: height 0.3s;
        }

        .bar-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 分类排行 */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .category-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            background: var(--bg-tertiary);
        }

        .category-info {
            flex: 1;
        }

        .category-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 3px;
        }

        .category-amount {
            text-align: right;
            min-width: 80px;
        }

        .amount-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .amount-percent {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .bottom-nav {
            display: flex;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 0 24px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 11px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .fab {
            position: absolute;
            bottom: 90px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.35);
            color: white;
            border: none;
            cursor: pointer;
        }

        .fab svg {
            width: 28px;
            height: 28px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>●●●●●</span>
        </div>

        <div class="header">
            <div class="header-title">统计分析</div>
            <div class="time-tabs">
                <button class="time-tab">周</button>
                <button class="time-tab active">月</button>
                <button class="time-tab">年</button>
            </div>
        </div>

        <div class="stats-content">
            <div class="summary-card">
                <div class="summary-total">
                    <div class="summary-label">4月总支出</div>
                    <div class="summary-amount">¥3,280</div>
                </div>
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="item-label">日均支出</div>
                        <div class="item-value">¥109</div>
                    </div>
                    <div class="summary-item">
                        <div class="item-label">记账天数</div>
                        <div class="item-value">6天</div>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">每日支出趋势</div>
                <div class="bar-chart">
                    <div class="bar-group">
                        <div class="bar" style="height: 85px;"></div>
                        <div class="bar-label">1日</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 45px;"></div>
                        <div class="bar-label">2日</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 120px;"></div>
                        <div class="bar-label">3日</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 65px;"></div>
                        <div class="bar-label">4日</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 95px;"></div>
                        <div class="bar-label">5日</div>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 52px;"></div>
                        <div class="bar-label">6日</div>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">分类排行</div>
                <div class="category-list">
                    <div class="category-item">
                        <div class="category-icon">🍜</div>
                        <div class="category-info">
                            <div class="category-name">餐饮</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 75%;"></div>
                            </div>
                        </div>
                        <div class="category-amount">
                            <div class="amount-value">¥1,240</div>
                            <div class="amount-percent">38%</div>
                        </div>
                    </div>

                    <div class="category-item">
                        <div class="category-icon">🏠</div>
                        <div class="category-info">
                            <div class="category-name">房租</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 45%;"></div>
                            </div>
                        </div>
                        <div class="category-amount">
                            <div class="amount-value">¥800</div>
                            <div class="amount-percent">24%</div>
                        </div>
                    </div>

                    <div class="category-item">
                        <div class="category-icon">🛒</div>
                        <div class="category-info">
                            <div class="category-name">购物</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 35%;"></div>
                            </div>
                        </div>
                        <div class="category-amount">
                            <div class="amount-value">¥580</div>
                            <div class="amount-percent">18%</div>
                        </div>
                    </div>

                    <div class="category-item">
                        <div class="category-icon">🚌</div>
                        <div class="category-info">
                            <div class="category-name">交通</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 25%;"></div>
                            </div>
                        </div>
                        <div class="category-amount">
                            <div class="amount-value">¥420</div>
                            <div class="amount-percent">13%</div>
                        </div>
                    </div>

                    <div class="category-item">
                        <div class="category-icon">🎮</div>
                        <div class="category-info">
                            <div class="category-name">娱乐</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 15%;"></div>
                            </div>
                        </div>
                        <div class="category-amount">
                            <div class="amount-value">¥240</div>
                            <div class="amount-percent">7%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="fab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <div class="bottom-nav">
            <a href="#" class="nav-item" data-tab="home">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="#" class="nav-item active" data-tab="stats">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/>
                </svg>
                <span>统计</span>
            </a>
            <a href="#" class="nav-item" data-tab="category">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span>分类</span>
            </a>
        </div>
    </div>

    <script>
        // 时间切换
        document.querySelectorAll('.time-tab').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.time-tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
