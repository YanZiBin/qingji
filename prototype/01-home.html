<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账APP - 首页（清新可爱版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2026;
            --bg-tertiary: #242b33;
            --bg-card: #1e2630;
            --bg-hover: #2a3441;
            --text-primary: #f0f4f8;
            --text-secondary: #a8b5c4;
            --text-tertiary: #6b7c8d;
            --accent: #4ecdc4;
            --accent-gradient: linear-gradient(135deg, #4ecdc4 0%, #44a8b3 100%);
            --income: #7bed9f;
            --expense: #ff6b81;
            --border: #2a3441;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #0a0d10;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .phone-frame {
            max-width: 375px;
            margin: 40px auto;
            background: var(--bg-primary);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
            border: 2px solid #3a4756;
            min-height: 812px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 8px;
            background: var(--bg-primary);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header {
            background: var(--bg-secondary);
            padding: 24px 24px 28px;
            border-bottom: 1px solid var(--border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 8px 14px;
            border-radius: 10px;
        }

        .month-selector svg {
            width: 14px;
            height: 14px;
        }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .summary-amount {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .income-amount {
            color: var(--income);
        }

        .expense-amount {
            color: var(--expense);
        }

        .records-section {
            padding: 20px;
            flex: 1;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .view-all {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
        }

        .date-group {
            margin-bottom: 20px;
        }

        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .date-total {
            font-weight: 600;
        }

        .record-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 14px;
            flex-shrink: 0;
            background: var(--bg-tertiary);
        }

        .record-info {
            flex: 1;
        }

        .record-category {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .record-note {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .record-amount {
            font-size: 16px;
            font-weight: 600;
        }

        .expense {
            color: var(--expense);
        }

        .income {
            color: var(--income);
        }

        .bottom-nav {
            display: flex;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 0 24px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 11px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .fab {
            position: absolute;
            bottom: 90px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.35);
            color: white;
            border: none;
            cursor: pointer;
        }

        .fab svg {
            width: 28px;
            height: 28px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>●●●●●</span>
        </div>

        <div class="header">
            <div class="header-top">
                <div class="header-title">我的账本</div>
                <div class="month-selector">
                    2026年4月
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </div>
            </div>

            <div class="summary">
                <div class="summary-item">
                    <div class="summary-label">本月收入</div>
                    <div class="summary-amount income-amount">¥8,500</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">本月支出</div>
                    <div class="summary-amount expense-amount">¥3,280</div>
                </div>
            </div>
        </div>

        <div class="records-section">
            <div class="section-header">
                <div class="section-title">最近记录</div>
                <a href="#" class="view-all">查看全部</a>
            </div>

            <div class="date-group">
                <div class="date-header">
                    <span>今天 4月6日</span>
                    <span class="date-total" style="color: var(--expense);">支出 ¥156</span>
                </div>

                <div class="record-item">
                    <div class="record-icon">🍜</div>
                    <div class="record-info">
                        <div class="record-category">餐饮</div>
                        <div class="record-note">午餐 · 同事聚餐</div>
                    </div>
                    <div class="record-amount expense">-¥86</div>
                </div>

                <div class="record-item">
                    <div class="record-icon">🚌</div>
                    <div class="record-info">
                        <div class="record-category">交通</div>
                        <div class="record-note">地铁充值</div>
                    </div>
                    <div class="record-amount expense">-¥70</div>
                </div>
            </div>

            <div class="date-group">
                <div class="date-header">
                    <span>昨天 4月5日</span>
                    <span class="date-total" style="color: var(--expense);">支出 ¥245</span>
                </div>

                <div class="record-item">
                    <div class="record-icon">🛒</div>
                    <div class="record-info">
                        <div class="record-category">购物</div>
                        <div class="record-note">日用品</div>
                    </div>
                    <div class="record-amount expense">-¥128</div>
                </div>

                <div class="record-item">
                    <div class="record-icon">🎮</div>
                    <div class="record-info">
                        <div class="record-category">娱乐</div>
                        <div class="record-note">游戏充值</div>
                    </div>
                    <div class="record-amount expense">-¥117</div>
                </div>
            </div>

            <div class="date-group">
                <div class="date-header">
                    <span>4月1日</span>
                    <span class="date-total" style="color: var(--income);">收入 ¥8,500</span>
                </div>

                <div class="record-item">
                    <div class="record-icon">💰</div>
                    <div class="record-info">
                        <div class="record-category">工资</div>
                        <div class="record-note">3月工资</div>
                    </div>
                    <div class="record-amount income">+¥8,500</div>
                </div>
            </div>
        </div>

        <button class="fab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <div class="bottom-nav">
            <a href="#" class="nav-item active" data-tab="home">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="#" class="nav-item" data-tab="stats">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/>
                </svg>
                <span>统计</span>
            </a>
            <a href="#" class="nav-item" data-tab="category">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span>分类</span>
            </a>
        </div>
    </div>

    <script>
        // 简单的导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
