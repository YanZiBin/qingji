<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账APP - 记账页（清新可爱版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2026;
            --bg-tertiary: #242b33;
            --bg-card: #1e2630;
            --bg-hover: #2a3441;
            --text-primary: #f0f4f8;
            --text-secondary: #a8b5c4;
            --text-tertiary: #6b7c8d;
            --accent: #4ecdc4;
            --accent-gradient: linear-gradient(135deg, #4ecdc4 0%, #44a8b3 100%);
            --income: #7bed9f;
            --expense: #ff6b81;
            --border: #2a3441;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #0a0d10;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .phone-frame {
            max-width: 375px;
            margin: 40px auto;
            background: var(--bg-primary);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
            border: 2px solid #3a4756;
            min-height: 812px;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 8px;
            background: var(--bg-primary);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .back-btn, .save-btn {
            background: none;
            border: none;
            font-size: 15px;
            color: var(--accent);
            cursor: pointer;
            padding: 8px;
        }

        .save-btn {
            font-weight: 600;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .type-switcher {
            display: flex;
            background: var(--bg-tertiary);
            margin: 16px 20px;
            border-radius: 12px;
            padding: 4px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-btn.active {
            background: var(--bg-card);
            box-shadow: 0 2px 8px var(--shadow);
            color: var(--accent);
        }

        .amount-display {
            text-align: center;
            padding: 28px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .amount-input {
            font-size: 48px;
            font-weight: 300;
            color: var(--text-primary);
            border: none;
            background: transparent;
            text-align: center;
            width: 100%;
            outline: none;
            letter-spacing: 1px;
        }

        .amount-input::placeholder {
            color: var(--text-tertiary);
        }

        .selected-category {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .category-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

        .note-input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            outline: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .note-input::placeholder {
            color: var(--text-tertiary);
        }

        .datetime-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        .datetime-label {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .datetime-value {
            font-size: 15px;
            color: var(--text-primary);
        }

        .categories-section {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .categories-title {
            padding: 20px 20px 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 20px 24px;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-card);
        }

        .category-item:hover {
            background: var(--bg-hover);
        }

        .category-item.selected {
            background: var(--accent);
        }

        .category-item.selected .category-name {
            color: #ffffff;
        }

        .category-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--bg-tertiary);
        }

        .category-item.selected .category-icon {
            background: rgba(255, 255, 255, 0.2);
        }

        .category-name {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .keyboard-section {
            background: var(--bg-tertiary);
            padding: 16px 20px 32px;
            border-top: 1px solid var(--border);
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key-btn {
            padding: 18px;
            border: none;
            background: var(--bg-card);
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.1s;
        }

        .key-btn:active {
            background: var(--bg-hover);
            transform: scale(0.98);
        }

        .key-btn.confirm {
            background: var(--accent-gradient);
            color: #ffffff;
            font-weight: 600;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>●●●●●</span>
        </div>

        <div class="header">
            <button class="back-btn">取消</button>
            <div class="header-title">记一笔</div>
            <button class="save-btn">保存</button>
        </div>

        <div class="type-switcher">
            <button class="type-btn active">支出</button>
            <button class="type-btn">收入</button>
        </div>

        <div class="amount-display">
            <input type="text" class="amount-input" placeholder="0.00" value="86">
        </div>

        <div class="selected-category">
            <div class="category-badge">
                <span>🍜</span>
                <span>餐饮</span>
            </div>
        </div>

        <input type="text" class="note-input" placeholder="添加备注...">

        <div class="datetime-row">
            <span class="datetime-label">时间</span>
            <span class="datetime-value">2026-04-06 12:30</span>
        </div>

        <div class="categories-section">
            <div class="categories-title">选择分类</div>
            <div class="categories-grid">
                <div class="category-item selected">
                    <div class="category-icon">🍜</div>
                    <div class="category-name">餐饮</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🚌</div>
                    <div class="category-name">交通</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🛒</div>
                    <div class="category-name">购物</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🎮</div>
                    <div class="category-name">娱乐</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🏠</div>
                    <div class="category-name">房租</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">💊</div>
                    <div class="category-name">医疗</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">📚</div>
                    <div class="category-name">学习</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">👔</div>
                    <div class="category-name">服饰</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🎁</div>
                    <div class="category-name">礼金</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">📱</div>
                    <div class="category-name">通讯</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🏋️</div>
                    <div class="category-name">运动</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">➕</div>
                    <div class="category-name">添加</div>
                </div>
            </div>
        </div>

        <div class="keyboard-section">
            <div class="keyboard-grid">
                <button class="key-btn">1</button>
                <button class="key-btn">2</button>
                <button class="key-btn">3</button>
                <button class="key-btn">4</button>
                <button class="key-btn">5</button>
                <button class="key-btn">6</button>
                <button class="key-btn">7</button>
                <button class="key-btn">8</button>
                <button class="key-btn">9</button>
                <button class="key-btn">.</button>
                <button class="key-btn">0</button>
                <button class="key-btn confirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 类型切换
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 分类选择
        document.querySelectorAll('.category-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.category-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    </script>
</body>
</html>
