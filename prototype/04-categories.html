<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账APP - 分类管理页（清新可爱版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2026;
            --bg-tertiary: #242b33;
            --bg-card: #1e2630;
            --bg-hover: #2a3441;
            --text-primary: #f0f4f8;
            --text-secondary: #a8b5c4;
            --text-tertiary: #6b7c8d;
            --accent: #4ecdc4;
            --accent-gradient: linear-gradient(135deg, #4ecdc4 0%, #44a8b3 100%);
            --income: #7bed9f;
            --expense: #ff6b81;
            --border: #2a3441;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #0a0d10;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .phone-frame {
            max-width: 375px;
            margin: 40px auto;
            background: var(--bg-primary);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
            border: 2px solid #3a4756;
            min-height: 812px;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 8px;
            background: var(--bg-primary);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .edit-btn {
            background: none;
            border: none;
            font-size: 15px;
            color: var(--accent);
            cursor: pointer;
            padding: 8px;
        }

        .type-tabs {
            display: flex;
            background: var(--bg-tertiary);
            margin: 16px 20px;
            border-radius: 12px;
            padding: 4px;
        }

        .type-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .type-tab.active {
            background: var(--bg-card);
            box-shadow: 0 2px 8px var(--shadow);
            color: var(--accent);
        }

        .categories-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .add-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 16px 8px;
            border-radius: 14px;
            background: var(--bg-card);
            position: relative;
            border: 1px solid var(--border);
        }

        .category-item.editing .delete-btn {
            display: flex;
        }

        .delete-btn {
            display: none;
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--expense);
            border: 2px solid var(--bg-primary);
            color: #ffffff;
            font-size: 14px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: var(--bg-tertiary);
        }

        .category-name {
            font-size: 13px;
            color: var(--text-primary);
            text-align: center;
        }

        .custom-category {
            border: 2px dashed var(--text-tertiary);
            background: transparent;
        }

        .custom-category .category-icon {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 24px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 375px;
            animation: slideUp 0.3s ease;
            border-top: 1px solid var(--border);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .icon-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .icon-option {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background: var(--bg-tertiary);
        }

        .icon-option:hover {
            transform: scale(1.05);
        }

        .icon-option.selected {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .fab {
            position: absolute;
            bottom: 90px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.35);
            color: white;
            border: none;
            cursor: pointer;
        }

        .fab svg {
            width: 28px;
            height: 28px;
        }

        .bottom-nav {
            display: flex;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 0 24px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 11px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .tip-text {
            font-size: 12px;
            color: var(--text-tertiary);
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>●●●●●</span>
        </div>

        <div class="header">
            <div class="header-title">分类管理</div>
            <button class="edit-btn" id="editBtn">编辑</button>
        </div>

        <div class="type-tabs">
            <button class="type-tab active">支出</button>
            <button class="type-tab">收入</button>
        </div>

        <div class="categories-section">
            <div class="section-header">
                <div class="section-title">常用分类</div>
                <button class="add-btn" id="addBtn">+</button>
            </div>

            <div class="categories-grid" id="categoriesGrid">
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🍜</div>
                    <div class="category-name">餐饮</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🚌</div>
                    <div class="category-name">交通</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🛒</div>
                    <div class="category-name">购物</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🎮</div>
                    <div class="category-name">娱乐</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🏠</div>
                    <div class="category-name">房租</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">💊</div>
                    <div class="category-name">医疗</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">📚</div>
                    <div class="category-name">学习</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">👔</div>
                    <div class="category-name">服饰</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🎁</div>
                    <div class="category-name">礼金</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">📱</div>
                    <div class="category-name">通讯</div>
                </div>
                <div class="category-item">
                    <button class="delete-btn">×</button>
                    <div class="category-icon">🏋️</div>
                    <div class="category-name">运动</div>
                </div>
                <div class="category-item custom-category">
                    <div class="category-icon">+</div>
                    <div class="category-name">自定义</div>
                </div>
            </div>

            <div class="tip-text">
                点击「编辑」可删除自定义分类<br>
                点击「+」可添加新分类
            </div>
        </div>

        <button class="fab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <div class="bottom-nav">
            <a href="#" class="nav-item" data-tab="home">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="#" class="nav-item" data-tab="stats">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/>
                </svg>
                <span>统计</span>
            </a>
            <a href="#" class="nav-item active" data-tab="category">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span>分类</span>
            </a>
        </div>
    </div>

    <!-- 添加分类弹窗 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">添加分类</div>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">分类名称</label>
                <input type="text" class="form-input" placeholder="请输入分类名称">
            </div>
            <div class="form-group">
                <label class="form-label">选择图标</label>
                <div class="icon-picker">
                    <div class="icon-option">🍜</div>
                    <div class="icon-option">🚌</div>
                    <div class="icon-option">🛒</div>
                    <div class="icon-option">🎮</div>
                    <div class="icon-option">🏠</div>
                    <div class="icon-option">💊</div>
                    <div class="icon-option">📚</div>
                    <div class="icon-option">👔</div>
                </div>
            </div>
            <button class="submit-btn">保存</button>
        </div>
    </div>

    <script>
        // 类型切换
        document.querySelectorAll('.type-tab').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 编辑模式
        const editBtn = document.getElementById('editBtn');
        const grid = document.getElementById('categoriesGrid');
        let isEditing = false;

        editBtn.addEventListener('click', function() {
            isEditing = !isEditing;
            this.textContent = isEditing ? '完成' : '编辑';
            grid.querySelectorAll('.category-item').forEach(item => {
                if (isEditing) {
                    item.classList.add('editing');
                } else {
                    item.classList.remove('editing');
                }
            });
        });

        // 添加弹窗
        const addBtn = document.getElementById('addBtn');
        const addModal = document.getElementById('addModal');
        const closeModal = document.getElementById('closeModal');

        addBtn.addEventListener('click', () => addModal.classList.add('active'));
        closeModal.addEventListener('click', () => addModal.classList.remove('active'));

        // 图标选择
        document.querySelectorAll('.icon-option').forEach(icon => {
            icon.addEventListener('click', function() {
                document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    </script>
</body>
</html>
