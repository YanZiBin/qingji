<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻记 APP 图标设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #0f1419;
            color: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 60px;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .icon-item img, .icon-item svg {
            border-radius: 22%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .size-label {
            font-size: 14px;
            color: #a8b5c4;
        }

        .design-info {
            max-width: 800px;
            background: #1a2026;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #2a3441;
        }

        .design-info h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #4ecdc4;
        }

        .design-info p {
            font-size: 16px;
            line-height: 1.8;
            color: #a8b5c4;
            margin-bottom: 12px;
        }

        .design-info ul {
            margin-left: 20px;
            color: #a8b5c4;
        }

        .design-info li {
            margin-bottom: 8px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>🎨 轻记 APP 图标设计方案</h1>

    <div class="icon-grid">
        <div class="icon-item">
            <svg width="180" height="180" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#44A8B3;stop-opacity:1" />
                    </linearGradient>
                    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#000000" flood-opacity="0.2"/>
                    </filter>
                </defs>
                <rect x="80" y="80" width="864" height="864" rx="180" fill="url(#bg1)" filter="url(#shadow1)"/>
                <g transform="translate(512, 512)">
                    <rect x="-200" y="-240" width="400" height="480" rx="30" fill="#FFFFFF" opacity="0.95"/>
                    <line x1="-140" y1="-160" x2="140" y2="-160" stroke="#4ECDC4" stroke-width="8" stroke-linecap="round"/>
                    <line x1="-140" y1="-100" x2="140" y2="-100" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
                    <line x1="-140" y1="-40" x2="140" y2="-40" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
                    <line x1="-140" y1="20" x2="140" y2="20" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
                    <line x1="-140" y1="80" x2="140" y2="80" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
                    <line x1="-140" y1="140" x2="140" y2="140" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
                    <text x="0" y="40" font-family="Arial, sans-serif" font-size="160" font-weight="bold" fill="#4ECDC4" text-anchor="middle" dominant-baseline="middle">¥</text>
                    <circle cx="160" cy="-180" r="20" fill="#FFD93D" opacity="0.9"/>
                    <circle cx="-180" cy="160" r="15" fill="#FF6B81" opacity="0.8"/>
                </g>
            </svg>
            <span class="size-label">方案 A：记账本 + ¥ 符号</span>
        </div>

        <div class="icon-item">
            <svg width="180" height="180" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#44A8B3;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect x="80" y="80" width="864" height="864" rx="180" fill="url(#bg2)"/>
                <g transform="translate(512, 512)">
                    <circle cx="0" cy="0" r="240" fill="#FFFFFF" opacity="0.9"/>
                    <text x="0" y="20" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="#4ECDC4" text-anchor="middle">¥</text>
                </g>
            </svg>
            <span class="size-label">方案 B：简洁圆形 ¥</span>
        </div>

        <div class="icon-item">
            <svg width="180" height="180" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#44A8B3;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect x="80" y="80" width="864" height="864" rx="180" fill="url(#bg3)"/>
                <g transform="translate(512, 512)">
                    <rect x="-160" y="-200" width="320" height="400" rx="24" fill="#FFFFFF" opacity="0.9"/>
                    <rect x="-120" y="-140" width="240" height="20" rx="10" fill="#4ECDC4"/>
                    <rect x="-120" y="-80" width="240" height="16" rx="8" fill="#E0E0E0"/>
                    <rect x="-120" y="-40" width="240" height="16" rx="8" fill="#E0E0E0"/>
                    <rect x="-120" y="0" width="240" height="16" rx="8" fill="#E0E0E0"/>
                    <rect x="-120" y="40" width="160" height="16" rx="8" fill="#E0E0E0"/>
                    <rect x="-120" y="80" width="200" height="16" rx="8" fill="#E0E0E0"/>
                    <circle cx="180" cy="-160" r="24" fill="#FFD93D"/>
                    <circle cx="-180" cy="160" r="18" fill="#FF6B81"/>
                </g>
            </svg>
            <span class="size-label">方案 C：纯记账本造型</span>
        </div>
    </div>

    <div class="design-info">
        <h2>🎯 设计说明</h2>
        <p><strong>主色调：</strong>薄荷绿渐变 (#4ECDC4 → #44A8B3)，与APP内部主题一致</p>
        <p><strong>核心元素：</strong></p>
        <ul>
            <li>💰 <strong>¥ 符号</strong> - 直观表达"钱/记账"的主题</li>
            <li>📝 <strong>记账本</strong> - 表达"记录"的概念</li>
            <li>✨ <strong>装饰圆点</strong> - 增加可爱感</li>
        </ul>
        <p><strong>圆角：</strong>22% 圆角，符合现代APP图标规范</p>
        <p><strong>阴影：</strong>轻微投影，增加层次感</p>
    </div>
</body>
</html>
